apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-config
  namespace: nekazari
  labels:
    app: zenoh-router
    module: robotics
data:
  zenoh.json5: |
    {
      mode: "router",
      listen: {
        endpoints: [
          "tcp/0.0.0.0:7447"
        ]
      },
      transport: {
        link: {
          tls: {
            server_certificate: "/tls/tls.crt",
            server_private_key: "/tls/tls.key"
          }
        }
      },
      plugins: {
        rest: {
          http_port: 8000
        }
      }
    }
