# =============================================================================
# Robotics Module Backend Deployment
# =============================================================================
# FastAPI API Service + RQ Worker for robotics processing
# =============================================================================

---
# Deployment: Robotics Module API Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotics-api
  namespace: nekazari
  labels:
    app: robotics-api
    component: backend
    module: robotics
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robotics-api
  template:
    metadata:
      labels:
        app: robotics-api
        component: backend
        module: robotics
    spec:
      containers:
        - name: api
          image: ghcr.io/nkz-os/nkz-module-robotics/robotics-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # Database (use existing postgresql-secret)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            # Redis
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            # MinIO (use existing minio-secret)
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            # Orion-LD
            - name: ORION_URL
              value: "http://orion-ld-service:1026"
            # Authentication — values from platform-config ConfigMap
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: keycloak_url
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: jwt_issuer
            - name: JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: jwks_url
            - name: JWT_ALGORITHM
              value: "RS256"
            # Zenoh
            - name: ZENOH_ROUTER_ENDPOINT
              value: "tcp/zenoh-service.nekazari.svc.cluster.local:7447"
            - name: ZENOH_REST_URL
              value: "http://zenoh-service:8000"
            # CORS — set to your frontend origin
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cors_origins
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Deployment: Robotics Worker (RQ)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotics-worker
  namespace: nekazari
  labels:
    app: robotics-worker
    component: worker
    module: robotics
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robotics-worker
  template:
    metadata:
      labels:
        app: robotics-worker
        component: worker
        module: robotics
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-robotics/robotics-backend:latest
          imagePullPolicy: Always
          command:
            [
              "/bin/sh",
              "-c",
              "/opt/conda/bin/rq worker robotics-processing --url $REDIS_URL",
            ]
          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            # Redis (with password from secret)
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            # MinIO
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            # Orion-LD
            - name: ORION_URL
              value: "http://orion-ld-service:1026"
            # Worker settings
            - name: WORKER_QUEUE_NAME
              value: "robotics-processing"
            - name: WORKER_TIMEOUT
              value: "1800"
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

---
# Service: Robotics Module API
apiVersion: v1
kind: Service
metadata:
  name: robotics-api-service
  namespace: nekazari
  labels:
    app: robotics-api
    component: backend
    module: robotics
spec:
  selector:
    app: robotics-api
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
