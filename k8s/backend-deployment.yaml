apiVersion: apps/v1
kind: Deployment
metadata:
  name: robotics-api
  namespace: nekazari
  labels:
    app: robotics-api
    module: robotics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robotics-api
  template:
    metadata:
      labels:
        app: robotics-api
        module: robotics
    spec:
      containers:
        - name: api
          image: ghcr.io/nkz-os/nkz-module-robotics/robotics-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: TIMESCALE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: ORION_URL
              value: "http://orion-ld-service:1026"
            - name: ZENOH_REST_URL
              value: "http://zenoh-service:8000"
            - name: ZENOH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenoh-secret
                  key: admin-password
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: keycloak_url
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: jwt_issuer
            - name: JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: jwks_url
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cors_origins
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
